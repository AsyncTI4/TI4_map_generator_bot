server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: prometheus

spring:
  datasource:
    url: "jdbc:sqlite:${DB_PATH:./}/tibot.db"
    driver-class-name: org.sqlite.JDBC
    hikari:
      # WAL permits concurrent readers while SQLite continues to serialize writers.
      maximum-pool-size: 4
      connection-timeout: 30000
      # Xerial applies these properties to every connection. A multi-statement
      # connection-init-sql only executes its first PRAGMA.
      data-source-properties:
        journal_mode: "WAL"
        busy_timeout: "30000"
        synchronous: "NORMAL"
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
          batch_size: 100
          order_inserts: true
          order_updates: true
          generate_statistics: false
    open-in-view: false
  web:
    error:
      include-stacktrace: never
      include-binding-errors: never
      include-message: always

ti4:
  deploy:
    lease-key: discord-bot
    lease-duration-seconds: 30
    heartbeat-interval-seconds: 1

combat-contest:
  is-dev: ${COMBAT_CONTEST_IS_DEV:false}
