server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: prometheus

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:tibot;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAXIMUM_POOL_SIZE:10}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
          batch_size: 100
          order_inserts: true
          order_updates: true
          generate_statistics: false
    open-in-view: false
  web:
    error:
      include-stacktrace: never
      include-binding-errors: never
      include-message: always

ti4:
  deploy:
    lease-key: discord-bot
    lease-duration-seconds: 30
    heartbeat-interval-seconds: 1

combat-contest:
  is-dev: ${COMBAT_CONTEST_IS_DEV:false}
