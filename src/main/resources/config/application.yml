server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: prometheus

spring:
  datasource:
    url: "jdbc:sqlite:${DB_PATH:./}/tibot.db"
    driver-class-name: org.sqlite.JDBC
    hikari:
      # WAL allows for 1 writer at a time, but readers can go ahead
      maximum-pool-size: 4
      connection-init-sql: |
        PRAGMA journal_mode=WAL;
        PRAGMA busy_timeout=30000;
        PRAGMA synchronous=NORMAL;
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
          batch_size: 100
          order_inserts: true
          order_updates: true
          generate_statistics: false
    open-in-view: false
  web:
    error:
      include-stacktrace: never
      include-binding-errors: never
      include-message: always

ti4:
  deploy:
    lease-key: discord-bot
    lease-duration-seconds: 30
    heartbeat-interval-seconds: 1
