enabled: false

candidateSelection:
  window:
    lookbackMinutes: 480
    refreshCronIntervalSeconds: 300
  targetCandidatesPerHour: 4

promotion:
  enabled: true
  intervalSeconds: 5

replayExecution:
  startDelaySeconds: 15
  dailyLockHourCentral: -1
  dailyLockMinuteCentral: 0
  replayIntervalSeconds: 1
  maxEventGapSeconds: 1
  pendingResolutionWindowSeconds: 30

retention:
  observationRetentionDays: 2
  eventRetentionDays: 2

runtime:
  devMode: true
  trackAllCombatsAsCandidates: true
  immediatePromotionOnResolve: true

sideBets:
  enableSideBets: true
  maxBetsPerUser: 3
  costPoints: 1
  dynamicPayoutCap: 50
  afbWhiffSelectionBias: 2.0
  roundOneWhiffSelectionBias: 3.0
  roundOneSlamSelectionBias: 3.0
  winnerOneHpPayoutMultiplier: 0.5625
  dynamicPayoutTiers: "0.20:4,0.10:5,0.05:8,0.025:12,0.01:20,0.005:30"

initialIndividualPoints: 100
