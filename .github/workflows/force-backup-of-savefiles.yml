on:
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: "0 * * * *"
name: ForceSaveFileBackup
concurrency:
  group: "Start Bot"
jobs:
  save:
    name: Backup Game Saves
    runs-on: ubuntu-latest
    steps:
      - name: executing remote ssh commands using password
        id: backup
        continue-on-error: true
        uses: appleboy/ssh-action@master
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          timeout: 60s
          envs: DISCORD_WEBHOOK_URL
          script: |
            set -eu
            cd ${{ vars.HOST_TI4_SAVES_DIR }}
            echo "FORCING BACKUP OF SAVE FILES"
            rm -f .git/index.lock
            git fetch origin master
            git reset --mixed origin/master
            grep -qxF "*.bak" .git/info/exclude || printf "\n# Managed by ForceSaveFileBackup\n*.bak\n*.bak.*\n" >> .git/info/exclude
            git add -A -- . ':(glob,exclude)*.bak' ':(glob,exclude)**/*.bak' ':(glob,exclude)*.bak.*' ':(glob,exclude)**/*.bak.*'
            oversized_files="$(mktemp)"
            git diff --cached --name-only | while IFS= read -r file; do
              if [ -f "$file" ]; then
                size="$(wc -c < "$file" | tr -d ' ')"
                if [ "$size" -gt 95000000 ]; then
                  printf '%s (%s bytes)\n' "$file" "$size" >> "$oversized_files"
                  git reset -q HEAD -- "$file"
                fi
              fi
            done
            if [ -s "$oversized_files" ]; then
              echo "Skipped files larger than GitHub's 100 MB limit:"
              cat "$oversized_files"
            fi
            rm -f "$oversized_files"
            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "save files"
            fi
            git push
            curl -X POST -H 'Content-Type: application/json' -d '{"content":"Backup Successful"}' $DISCORD_WEBHOOK_URL
            echo "DONE!"

      - name: retry executing remote ssh commands using password
        if: steps.backup.outcome == 'failure'
        uses: appleboy/ssh-action@master
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          timeout: 60s
          envs: DISCORD_WEBHOOK_URL
          script: |
            set -eu
            cd ${{ vars.HOST_TI4_SAVES_DIR }}
            echo "FORCING BACKUP OF SAVE FILES (retry)"
            rm -f .git/index.lock
            git fetch origin master
            git reset --mixed origin/master
            grep -qxF "*.bak" .git/info/exclude || printf "\n# Managed by ForceSaveFileBackup\n*.bak\n*.bak.*\n" >> .git/info/exclude
            git add -A -- . ':(glob,exclude)*.bak' ':(glob,exclude)**/*.bak' ':(glob,exclude)*.bak.*' ':(glob,exclude)**/*.bak.*'
            oversized_files="$(mktemp)"
            git diff --cached --name-only | while IFS= read -r file; do
              if [ -f "$file" ]; then
                size="$(wc -c < "$file" | tr -d ' ')"
                if [ "$size" -gt 95000000 ]; then
                  printf '%s (%s bytes)\n' "$file" "$size" >> "$oversized_files"
                  git reset -q HEAD -- "$file"
                fi
              fi
            done
            if [ -s "$oversized_files" ]; then
              echo "Skipped files larger than GitHub's 100 MB limit:"
              cat "$oversized_files"
            fi
            rm -f "$oversized_files"
            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              git commit -m "save files"
            fi
            git push
            curl -X POST -H 'Content-Type: application/json' -d '{"content":"Backup Successful"}' $DISCORD_WEBHOOK_URL
            echo "DONE!"

      - name: Notify Discord on failure
        if: ${{ always() && (failure() || cancelled()) }}
        env:
          DISCORD_ERROR_WEBHOOK_URL: ${{ secrets.DISCORD_ERROR_WEBHOOK_URL }}
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            -d "{\"content\":\"⚠️ ForceSaveFileBackup failed or was cancelled for ${{ github.repository }} on ref ${{ github.ref_name }}. See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_ERROR_WEBHOOK_URL"
