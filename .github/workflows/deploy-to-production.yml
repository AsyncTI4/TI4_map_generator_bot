on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
name: BuildAndDeploy
permissions:
  contents: read
  packages: write
env:
  IMAGE_REPOSITORY: ghcr.io/asyncti4/ti4-map-generator-bot
concurrency:
  group: deploy-to-production-master
  cancel-in-progress: true
jobs:
  saveGamesBeforeDeploy:
    uses: ./.github/workflows/force-backup-of-savefiles.yml
    secrets: inherit
  buildImage:
    needs: saveGamesBeforeDeploy
    name: Build & Publish Bot Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute image tag
        id: image
        run: echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ steps.image.outputs.image_tag }}
            ${{ env.IMAGE_REPOSITORY }}:master
          cache-from: type=gha
          cache-to: type=gha,mode=max
  build:
    concurrency:
      group: "Start Bot"
    needs: [saveGamesBeforeDeploy, buildImage]
    name: Pull & Deploy Bot
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@master
        env:
            AWS_KEY: ${{ secrets.IMG_AWS_KEY }}
            AWS_SECRET: ${{ secrets.IMG_AWS_SECRET }}
            DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
            DISCORD_BOT_USERID: ${{ secrets.DISCORD_BOT_USERID }}
            DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
            REPO_DISPATCH_TOKEN: ${{ secrets.REPOSITORY_DISPATCH_TOKEN }}
            TI4_ULTIMATE_STATISTICS_API_KEY: ${{ secrets.TI4_ULTIMATE_STATISTICS_API_KEY }}
            MANAGEMENT_ENDPOINTS_ACTUATOR_API_KEY: ${{ secrets.MANAGEMENT_ENDPOINTS_ACTUATOR_API_KEY }}
            DISCORD_REDIRECT_URI: ${{ secrets.DISCORD_REDIRECT_URI }}
            DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
            DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
            ROLLBAR_ACCESS_TOKEN: ${{ secrets.ROLLBAR_ACCESS_TOKEN }}
            ROLLBAR_ENVIRONMENT: production
            ROLLBAR_CODE_VERSION: ${{ github.sha }}
        with:
            host: ${{ secrets.HOSTINGER_SSH_HOST }}
            username: ${{ secrets.HOSTINGER_SSH_USER }}
            password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
            port: ${{ secrets.HOSTINGER_SSH_PORT }}
            envs: AWS_KEY, AWS_SECRET, DISCORD_BOT_TOKEN, DISCORD_BOT_USERID, REPO_DISPATCH_TOKEN, TI4_ULTIMATE_STATISTICS_API_KEY, MANAGEMENT_ENDPOINTS_ACTUATOR_API_KEY, DISCORD_WEBHOOK_URL, DISCORD_REDIRECT_URI, DISCORD_CLIENT_ID, DISCORD_CLIENT_SECRET, ROLLBAR_ACCESS_TOKEN, ROLLBAR_ENVIRONMENT, ROLLBAR_CODE_VERSION
            script: |
              set -eu

              timestamp=$(date "+%F %T.%3N")
              curl -X POST -H 'Content-Type: application/json' -d "{\"content\":\"\`$timestamp\`NEW DEPLOYMENT TRIGGERED\"}" $DISCORD_WEBHOOK_URL
              echo "Pulling deployment config from GitHub..."
              cd ${{ vars.HOST_TI4_REPO_DIR }}
              git pull --ff-only
              export HOST_TI4_SAVES_DIR="${{ vars.HOST_TI4_SAVES_DIR }}"
              export HOST_TI4_REPO_DIR="${{ vars.HOST_TI4_REPO_DIR }}"
              export GUILDID_LIST="${{ vars.GUILDID_LIST }}"
              export COMPOSE_PROJECT_NAME="ti4-bot"
              export IMAGE_REPOSITORY="${{ env.IMAGE_REPOSITORY }}"
              export IMAGE_TAG="${{ needs.buildImage.outputs.image_tag }}"
              compose_file="docker-compose.production.yml"
              rollout_plugin_path="$HOME/.docker/cli-plugins/docker-rollout"

              if ! docker rollout --help >/dev/null 2>&1; then
                mkdir -p "$(dirname "$rollout_plugin_path")"
                curl -fsSL https://raw.githubusercontent.com/wowu/docker-rollout/v0.13/docker-rollout -o "$rollout_plugin_path"
                chmod +x "$rollout_plugin_path"
                docker rollout --help >/dev/null
              fi

              timestamp=$(date "+%F %T.%3N")
              curl -X POST -H 'Content-Type: application/json' -d "{\"content\":\"\`$timestamp\`PULLING DOCKER IMAGE ${IMAGE_TAG}\"}" $DISCORD_WEBHOOK_URL
              docker version
              docker compose -f "$compose_file" pull tibot

              timestamp=$(date "+%F %T.%3N")
              curl -X POST -H 'Content-Type: application/json' -d "{\"content\":\"\`$timestamp\`ENSURING TRAEFIK PROXY IS RUNNING\"}" $DISCORD_WEBHOOK_URL
              docker compose -f "$compose_file" up -d traefik

              timestamp=$(date "+%F %T.%3N")
              existing_bot_containers="$(docker compose -f "$compose_file" ps -q tibot || true)"
              if [ -n "$existing_bot_containers" ]; then
                curl -X POST -H 'Content-Type: application/json' -d "{\"content\":\"\`$timestamp\`ROLLING OUT NEW TIBOT CONTAINER\"}" $DISCORD_WEBHOOK_URL
                docker rollout -f "$compose_file" --timeout 600 --wait-after-healthy 2 --pre-stop-hook 'wget -qO- --post-data="" http://127.0.0.1:8081/api/public/deploy/drain || true; for i in $(seq 1 15); do wget -q -O - http://127.0.0.1:8081/api/public/ready >/dev/null 2>&1 || break; sleep 1; done' tibot
              else
                curl -X POST -H 'Content-Type: application/json' -d "{\"content\":\"\`$timestamp\`STARTING INITIAL TIBOT CONTAINER\"}" $DISCORD_WEBHOOK_URL
                docker compose -f "$compose_file" up -d tibot
              fi

              timestamp=$(date "+%F %T.%3N")
              curl -X POST -H 'Content-Type: application/json' -d "{\"content\":\"\`$timestamp\`VERIFYING SINGLE TIBOT CONTAINER\"}" $DISCORD_WEBHOOK_URL
              running_tibot_containers="$(docker ps -q --filter "label=com.docker.compose.project=${COMPOSE_PROJECT_NAME}" --filter "label=com.docker.compose.service=tibot" || true)"
              running_tibot_count="$(printf '%s\n' "$running_tibot_containers" | sed '/^$/d' | wc -l | tr -d ' ')"
              if [ "$running_tibot_count" -gt 1 ]; then
                desired_tibot_container="$(docker ps -q --filter "label=com.docker.compose.project=${COMPOSE_PROJECT_NAME}" --filter "label=com.docker.compose.service=tibot" --filter "ancestor=${IMAGE_REPOSITORY}:${IMAGE_TAG}" | head -n 1 || true)"
                if [ -z "$desired_tibot_container" ]; then
                  desired_tibot_container="$(printf '%s\n' "$running_tibot_containers" | sed '/^$/d' | head -n 1)"
                fi

                echo "Found $running_tibot_count running tibot containers. Keeping $desired_tibot_container and removing extras..."
                for container in $running_tibot_containers; do
                  if [ "$container" != "$desired_tibot_container" ]; then
                    docker stop --time 600 "$container"
                    docker rm "$container"
                  fi
                done
              fi

              running_tibot_containers="$(docker ps -q --filter "label=com.docker.compose.project=${COMPOSE_PROJECT_NAME}" --filter "label=com.docker.compose.service=tibot" || true)"
              running_tibot_count="$(printf '%s\n' "$running_tibot_containers" | sed '/^$/d' | wc -l | tr -d ' ')"
              if [ "$running_tibot_count" -ne 1 ]; then
                echo "Expected exactly one running tibot container, found $running_tibot_count" >&2
                docker ps --filter "label=com.docker.compose.project=${COMPOSE_PROJECT_NAME}" --filter "label=com.docker.compose.service=tibot"
                exit 1
              fi
              
              timestamp=$(date "+%F %T.%3N")
              curl -X POST -H 'Content-Type: application/json' -d "{\"content\":\"\`$timestamp\`CLEANING UP DOCKER\"}" $DISCORD_WEBHOOK_URL
              echo "Cleaning up docker stuff..."
              
              docker image prune --force --filter until=48h
              docker builder prune --force --filter until=48h
              
              echo "DONE!"
  saveGamesAfterDeploy:
    needs: [build, saveGamesBeforeDeploy]
    uses: ./.github/workflows/force-backup-of-savefiles.yml
    secrets: inherit
