name: RunTests
on:
  pull_request:
    branches: ["master"]
jobs:
  validate-json:
    name: check for invalid json files
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed JSON files
        id: json-diff
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" | grep -E '\.json$' || true)
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "$CHANGED" > /tmp/changed_json_files.txt
          fi
      - name: Validate changed JSON files
        if: steps.json-diff.outputs.has_changes == 'true'
        id: validate
        run: |
          python3 - << 'PYEOF'
          import sys, json, os

          with open('/tmp/changed_json_files.txt') as f:
              files = [line.strip() for line in f if line.strip()]

          errors = []
          for filepath in files:
              if not os.path.isfile(filepath):
                  continue
              try:
                  with open(filepath, encoding='utf-8') as fh:
                      json.load(fh)
              except json.JSONDecodeError as e:
                  errors.append({'file': filepath, 'line': e.lineno, 'col': e.colno, 'msg': e.msg})
                  print(f"::error file={filepath},line={e.lineno},col={e.colno}::{e.msg}", flush=True)

          if errors:
              summary_path = os.environ['GITHUB_STEP_SUMMARY']
              with open(summary_path, 'a') as fh:
                  fh.write('## \u274c Invalid JSON Files\n\n')
                  fh.write('| File | Line | Column | Error |\n')
                  fh.write('|------|------|--------|-------|\n')
                  for e in errors:
                      fh.write(f"| `{e['file']}` | {e['line']} | {e['col']} | {e['msg']} |\n")
                  fh.write('\n> **Tip:** Open the file in a text editor that highlights JSON errors'
                           ' (e.g. VS Code) or paste the contents into'
                           ' [jsonlint.com](https://jsonlint.com) to find and fix the problem.\n')
              import json as _json
              with open('/tmp/json_errors.json', 'w') as fh:
                  _json.dump(errors, fh)
              sys.exit(1)
          PYEOF
      - name: Post JSON validation result as PR comment
        if: always() && steps.json-diff.outputs.has_changes == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- json-validation-report -->';
            const stepOutcome = '${{ steps.validate.outcome }}';

            let body;
            if (stepOutcome === 'failure') {
              let errors = [];
              try {
                errors = JSON.parse(fs.readFileSync('/tmp/json_errors.json', 'utf8'));
              } catch (e) {
                core.warning('Could not read JSON errors file: ' + e.message);
                return;
              }
              const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
              const bullets = errors.map(e => `- \`${e.file}\` (line ${e.line}, col ${e.col}): ${e.msg}`).join('\n');
              body = `${MARKER}\n## ❌ JSON Validation Errors\n\n${bullets}\n\n`
                   + `> **Tip:** Open the file in a text editor that highlights JSON errors (e.g. VS Code) `
                   + `or paste the contents into [jsonlint.com](https://jsonlint.com) to find and fix the problem.\n\n`
                   + `See the [Actions run](${runUrl}) for more details.`;
            } else if (stepOutcome === 'success') {
              body = `${MARKER}\n## ✅ JSON Validation Passed\n\nAll changed JSON files are valid.`;
            } else {
              return; // skipped or cancelled — nothing to report
            }

            // Find an existing sticky comment to update, or create a new one on failure
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else if (stepOutcome === 'failure') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  ci:
    name: Run Tests On Pull Request
    runs-on: ubuntu-latest
    needs: [validate-json]
    if: always() && (needs.validate-json.result == 'success' || needs.validate-json.result == 'skipped')
    permissions:
      checks: write
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect Java/POM file changes
        id: java-diff
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          if git diff --name-only "$BASE" "$HEAD" | grep -qE '^(src/|pom\.xml$|.*\.json$)'; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Fetch master branch for spotless
        if: steps.java-diff.outputs.has_changes == 'true'
        run: |
          git fetch --no-tags --depth=1 origin master
      - name: Set up JDK 21 for x64
        if: steps.java-diff.outputs.has_changes == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "corretto"
          architecture: x64
      - name: Cache Maven local repository
        if: steps.java-diff.outputs.has_changes == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Run the Maven verify phase
        if: steps.java-diff.outputs.has_changes == 'true'
        run: mvn --batch-mode --no-transfer-progress verify -P ci-spotless -Dorg.slf4j.simpleLogger.showDateTime=true -Dorg.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS
      - name: Publish Test Report for PRs
        if: always() && steps.java-diff.outputs.has_changes == 'true' && (github.event.pull_request.head.repo.full_name == github.repository)
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: "**/target/surefire-reports/TEST-*.xml"
          fail_on_failure: true 
      - name: Add Annotations for PRs from a forked repo
        if: failure() && steps.java-diff.outputs.has_changes == 'true' && (github.event.pull_request.head.repo.full_name != github.repository)
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: "**/target/surefire-reports/TEST-*.xml"
          annotate_only: true # forked repo cannot write to checks so just do annotations
      - name: Post Test Failure Comment on PR
        if: always() && steps.java-diff.outputs.has_changes == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            // Write a Python script to a temp file to avoid escaping issues
            const pythonLines = [
              'import glob, xml.etree.ElementTree as ET, json',
              'failures = []',
              'for f in glob.glob("**/target/surefire-reports/TEST-*.xml", recursive=True):',
              '    try:',
              '        root = ET.parse(f).getroot()',
              '        for tc in root.findall("testcase"):',
              '            for e in list(tc.findall("failure")) + list(tc.findall("error")):',
              '                cls = tc.get("classname", "").split(".")[-1]',
              '                name = tc.get("name", "")',
              '                msg = (e.get("message") or e.text or "").split("\\n")[0][:100]',
              '                entry = cls + "#" + name + (": " + msg if msg else "")',
              '                failures.append(entry)',
              '    except Exception:',
              '        pass',
              'print(json.dumps(failures))',
            ];
            fs.writeFileSync('/tmp/parse_surefire.py', pythonLines.join('\n'));

            let failures = [];
            try {
              const output = execSync('python3 /tmp/parse_surefire.py', { encoding: 'utf8' });
              failures = JSON.parse(output.trim());
            } catch (e) {
              core.warning('Could not parse surefire reports: ' + e.message);
              return;
            }

            if (failures.length === 0) return;

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            let body;
            if (failures.length > 5) {
              body = `## ❌ Test Failures (${failures.length})\n\nToo many failures to list — see the [Job Summary](${runUrl}) for details.`;
            } else {
              const bullets = failures.map(f => `- \`${f}\``).join('\n');
              body = `## ❌ Test Failures\n\n${bullets}\n\nSee the [Job Summary](${runUrl}) for more details.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
      - name: Upload Surefire Report
        if: always() && steps.java-diff.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
      - name: Upload SpotBugs Reports
        if: always() && steps.java-diff.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: |
            target/spotbugsXml.xml
            target/site/spotbugs.html
            target/spotbugsSarif.json
      - name: Upload SpotBugs SARIF to GitHub Code Scanning
        if: always() && steps.java-diff.outputs.has_changes == 'true' && github.event.pull_request.head.repo.full_name == github.repository && hashFiles('target/spotbugsSarif.json') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: target/spotbugsSarif.json
          category: spotbugs
