name: RunTests
on:
  pull_request:
    branches: ["master"]
jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      json: ${{ steps.filter.outputs.json }}
      java: ${{ steps.filter.outputs.java }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed file types
        id: filter
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          CHANGED_FILES="$(git diff --name-only "$BASE" "$HEAD")"
          if printf '%s\n' "$CHANGED_FILES" | grep -qE '\.json$'; then
            echo "json=true" >> "$GITHUB_OUTPUT"
          else
            echo "json=false" >> "$GITHUB_OUTPUT"
          fi
          if printf '%s\n' "$CHANGED_FILES" | grep -qE '^(src/|pom\.xml$)'; then
            echo "java=true" >> "$GITHUB_OUTPUT"
          else
            echo "java=false" >> "$GITHUB_OUTPUT"
          fi

  validate-json:
    name: check for invalid json files
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.json == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: check for invalid json files
        run: |
          find . -name "*.json" -print0 | while IFS= read -r -d $'\0' file; do
            if ! python -mjson.tool "$file" > /dev/null; then
              echo "INVALID $file" >&2
              exit 1
            fi
          done

  ci:
    name: Run Tests On Pull Request
    runs-on: ubuntu-latest
    needs: [changes, validate-json]
    if: always() && needs.changes.outputs.java == 'true' && (needs.validate-json.result == 'success' || needs.validate-json.result == 'skipped')
    permissions:
      checks: write
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch master branch for spotless
        run: |
          git fetch --no-tags --depth=1 origin master
      - name: Set up JDK 21 for x64
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "corretto"
          architecture: x64
      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Run the Maven verify phase
        run: mvn --batch-mode --no-transfer-progress verify -P ci-spotless -Dorg.slf4j.simpleLogger.showDateTime=true -Dorg.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS
      - name: Publish Test Report for PRs
        if: ${{ always()  &&  (github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: "**/target/surefire-reports/TEST-*.xml"
          fail_on_failure: true 
      - name: Add Annotations for PRs from a forked repo
        if: ${{ failure() &&  (github.event.pull_request.head.repo.full_name != github.repository) }}
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: "**/target/surefire-reports/TEST-*.xml"
          annotate_only: true # forked repo cannot write to checks so just do annotations
      - name: Post Test Failure Comment on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            // Write a Python script to a temp file to avoid escaping issues
            const pythonLines = [
              'import glob, xml.etree.ElementTree as ET, json',
              'failures = []',
              'for f in glob.glob("**/target/surefire-reports/TEST-*.xml", recursive=True):',
              '    try:',
              '        root = ET.parse(f).getroot()',
              '        for tc in root.findall("testcase"):',
              '            for e in list(tc.findall("failure")) + list(tc.findall("error")):',
              '                cls = tc.get("classname", "").split(".")[-1]',
              '                name = tc.get("name", "")',
              '                msg = (e.get("message") or e.text or "").split("\\n")[0][:100]',
              '                entry = cls + "#" + name + (": " + msg if msg else "")',
              '                failures.append(entry)',
              '    except Exception:',
              '        pass',
              'print(json.dumps(failures))',
            ];
            fs.writeFileSync('/tmp/parse_surefire.py', pythonLines.join('\n'));

            let failures = [];
            try {
              const output = execSync('python3 /tmp/parse_surefire.py', { encoding: 'utf8' });
              failures = JSON.parse(output.trim());
            } catch (e) {
              core.warning('Could not parse surefire reports: ' + e.message);
              return;
            }

            if (failures.length === 0) return;

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            let body;
            if (failures.length > 5) {
              body = `## ❌ Test Failures (${failures.length})\n\nToo many failures to list — see the [Job Summary](${runUrl}) for details.`;
            } else {
              const bullets = failures.map(f => `- \`${f}\``).join('\n');
              body = `## ❌ Test Failures\n\n${bullets}\n\nSee the [Job Summary](${runUrl}) for more details.`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
      - name: Upload Surefire Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
      - name: Upload SpotBugs Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: |
            target/spotbugsXml.xml
            target/site/spotbugs.html
            target/spotbugsSarif.json
      - name: Upload SpotBugs SARIF to GitHub Code Scanning
        if: always() && github.event.pull_request.head.repo.full_name == github.repository && hashFiles('target/spotbugsSarif.json') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: target/spotbugsSarif.json
          category: spotbugs
